name: Build and Release Rust Code
on:
  push:
    tags:
      - '*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Run tests
        run: cargo test --verbose
      - name: Build for Linux
        run: cargo build --release --target=x86_64-unknown-linux-gnu
      - name: Build for macOS
        run: cargo build --release --target=x86_64-apple-darwin
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: Automated release created by GitHub Actions
          draft: false
          prerelease: false
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v2
        with:
          name: renvsubst-linux
          path: target/x86_64-unknown-linux-gnu/release/renvsubst
      - name: Upload macOS Binary
        uses: actions/upload-artifact@v2
        with:
          name: renvsubst-macos
          path: target/x86_64-apple-darwin/release/renvsubst
      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          push: true
          labels: |
              org.opencontainers.image.title=renvsubst
              org.opencontainers.image.description=renvsubst
              org.opencontainers.image.url=https://github.com/containeroo/renvsubst
              org.opencontainers.image.source=https://github.com/containeroo/renvsubst
              org.opencontainers.image.version=${{ needs.get-tag.outputs.pkg-version }}
          tags: |
            ghcr.io/containeroo/renvsubst:latest
            ghcr.io/containeroo/renvsubst:${{ github.ref }}
