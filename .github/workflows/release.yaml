name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install cross
        run: cargo install cross
      - name: Test
        run: cargo test -- --test-threads=1
      - name: Build binaries
        run: cross build --target x86_64-unknown-linux-musl --target armv7-unknown-linux-musleabihf --target x86_64-apple-darwin --release
      - name: Determine last release tag
        id: last_release
        run: echo ::set-output name=tag::$(git describe --tags --abbrev=0)
      - name: Generate release notes
        id: release_notes
        uses: skywinder/github-changelog-generator@v1.14.4
        with:
          user: ${{ github.repository_owner }}
          project: ${{ github.repository }}
          tag: ${{ steps.last_release.outputs.tag }}
          exclude-labels: 'duplicate,question,invalid,wontfix'
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.release_notes.outputs.changelog }}
          draft: false
          prerelease: false
      - name: Upload binaries
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: |
            target/x86_64-unknown-linux-musl/release/renvsubst
            target/armv7-unknown-linux-musleabihf/release/renvsubst
            target/x86_64-apple-darwin/release/renvsubst
          asset_name: |
            renvsubst-linux-amd64
            renvsubst-linux-arm
            renvsubst-darwin-amd64
          asset_content_type: |
            application/octet-stream
            application/octet-stream
            application/octet-stream
