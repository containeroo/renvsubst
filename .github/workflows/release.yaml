name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Extract crate information
        id: extract_crate_information
        shell: bash
        run: |
          echo "PROJECT_NAME=$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
      - name: Install cross
        run: cargo install cross
      - name: Add x86_64-unknown-linux-musl
        run: rustup target add x86_64-unknown-linux-musl
      - name: Add armv7-unknown-linux-musleabihf
        run: rustup target add armv7-unknown-linux-musleabihf
      - name: add x86_64-apple-darwin
        run: rustup taget add x86_64-apple-darwin
      - name: Test
        run: cargo test -- --test-threads=1
      - name: Build binaries
        run: cross build --target x86_64-unknown-linux-musl --target armv7-unknown-linux-musleabihf --target x86_64-apple-darwin --release
      - name: Login to GHCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docker image (amd64)
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          platform: linux/amd64
          push: true
          tags: |
            ghcr.io/containeroo/renvsubst:amd64-${{ env.PROJECT_VERSION }}
            ghcr.io/containeroo/renvsubst:amd64-latest
          build-args: |
            BINARY=target/x86_64-unknown-linux-musl/releaserenvsubst
            BASE_IMAGE=scratch
      - name: Build docker image (arm)
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          platform: linux/arm/v7
          push: true
          tags: |
            ghcr.io/containeroo/renvsubst:arm-${{ env.PROJECT_VERSION }}
            ghcr.io/containeroo/renvsubst:arm-latest
          build-args: |
            BINARY=target/armv7-unknown-linux-musleabihf/releaserenvsubst
            BASE_IMAGE=arm32v7/scratch
      - name: Push docker manifest
        uses: docker/manifest-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          image: ghcr.io/containeroo/renvsubst:latest
          include: 'amd64,arm'
          exclude: 'arm64'
      - name: Determine last release tag
        id: last_release
        run: echo ::set-output name=tag::$(git describe --tags --abbrev=0)
      - name: Generate release notes
        id: release_notes
        uses: skywinder/github-changelog-generator@v1.14.4
        with:
          user: ${{ github.repository_owner }}
          project: ${{ github.repository }}
          tag: ${{ steps.last_release.outputs.tag }}
          exclude-labels: 'duplicate,question,invalid,wontfix'
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.release_notes.outputs.changelog }}
          draft: false
          prerelease: false
      - name: Upload binaries
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: |
            target/x86_64-unknown-linux-musl/release/renvsubst
            target/armv7-unknown-linux-musleabihf/release/renvsubst
            target/x86_64-apple-darwin/release/renvsubst
          asset_name: |
            renvsubst-${{ env.PROJECT_VERSION }}-linux-amd64
            renvsubst-${{ env.PROJECT_VERSION }}-linux-arm
            renvsubst-${{ env.PROJECT_VERSION }}-darwin-amd64
          asset_content_type: |
            application/octet-stream
            application/octet-stream
            application/octet-stream
