name: Release

permissions:
  contents: write

on:
  workflow_run:
    workflows: ["Tag"]
    types:
      - completed

jobs:
  get-tag:
    name: Get Tag From Package Version
    runs-on: ubuntu-latest
    outputs:
      pkg-version: ${{ steps.pkg-version.outputs.PKG_VERSION }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get tag
        id: pkg-version
        shell: bash
        run: |
          echo PKG_VERSION=$(sed  -r -n 's/const VERSION: &str = "(.*)";$/\1/p' src/main.rs) >> $GITHUB_OUTPUT
  create-release:
    name: Create release
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Create release
        uses: taiki-e/create-gh-release-action@v1
        with:
          branch: master
          ref: refs/tags/v${{ needs.get-tag.outputs.pkg-version }}
          token: ${{ secrets.GITHUB_TOKEN }}
  upload-assets:
    name: Upload assets to Github releases
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs:
     - get-tag
     - create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Upload Binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: renvsubst
          target: ${{ matrix.target }}
          archive: $bin-${{ matrix.target }}
          ref: refs/tags/v${{ needs.get-tag.outputs.pkg-version }}
          token: ${{ secrets.GITHUB_TOKEN }}
  push-to-registry:
    name: Push Docker image to Github registry
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs:
      - get-tag
      - upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Log in to GitHub Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare release tag
        id: tag
        run: echo ::set-output name=version::${GITHUB_REF#refs/tags/v}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          labels: |
            org.opencontainers.image.title=renvsubst
            org.opencontainers.image.description=renvsubst
            org.opencontainers.image.url=https://github.com/containeroo/renvsubst
            org.opencontainers.image.source=https://github.com/containeroo/renvsubst
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
          tags: |
            ghcr.io/containeroo/renvsubst:latest
            ghcr.io/containeroo/renvsubst:${{ steps.tag.outputs.version }}
