name: Build and Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Extract crate information
        id: extract_crate_information
        shell: bash
        run: |
          echo "PROJECT_NAME=$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
      - name: Install cross
        run: cargo install cross
      - name: Add x86_64-unknown-linux-musl
        run: rustup target add x86_64-unknown-linux-musl
      - name: Add armv7-unknown-linux-musleabihf
        run: rustup target add armv7-unknown-linux-musleabihf
      - name: add x86_64-apple-darwin
        run: rustup taget add x86_64-apple-darwin
      - name: Test
        run: cargo test -- --test-threads=1
      - name: Build binaries
        run: cross build --target x86_64-unknown-linux-musl --target armv7-unknown-linux-musleabihf --target x86_64-apple-darwin --release
      - name: Login to GHCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docker image (amd64)
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          platform: linux/amd64
          push: true
          tags: |
            ghcr.io/containeroo/renvsubst:amd64-${{ env.PROJECT_VERSION }}
            ghcr.io/containeroo/renvsubst:amd64-latest
          build-args: |
            BINARY=target/x86_64-unknown-linux-musl/releaserenvsubst
            BASE_IMAGE=scratch
      - name: Build docker image (arm)
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          platform: linux/arm/v7
          push: true
          tags: |
            ghcr.io/containeroo/renvsubst:arm-${{ env.PROJECT_VERSION }}
            ghcr.io/containeroo/renvsubst:arm-latest
          build-args: |
            BINARY=target/armv7-unknown-linux-musleabihf/releaserenvsubst
            BASE_IMAGE=scratch
