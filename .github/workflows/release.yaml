name: Build and Release Rust Code
on:
  push:
    tags:
      - "*"
env:
  CICD_INTERMEDIATES_DIR: "_cicd-intermediates"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Extract crate information
        shell: bash
        run: |
          echo "PROJECT_NAME=$(sed -n 's/^name = \"\(.*\)\"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$(sed -n 's/^version = \"\(.*\)\"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      - name: Install QEMU
        run: sudo apt-get install -y qemu-user-static
      - name: Login to GHCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        run: |
          docker buildx create --name builder --use --platform linux/amd64,linux/arm/v7
      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          builder: builder
          platforms: linux/amd64,linux/arm/v7
          build-args: |
            TARGETPLATFORM=$TARGETPLATFORM
          tags: |
            ghcr.io/containeroo/${{ env.PROJECT_NAME }}:latest
            ghcr.io/containeroo/${{ env.PROJECT_NAME }}:${{ env.PROJECT_VERSION }}
          labels: |
            maintainer=gi8lino
