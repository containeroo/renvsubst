name: Build and Release Rust Code
on:
  push:
    tags:
      - "*"
env:
  CICD_INTERMEDIATES_DIR: "_cicd-intermediates"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust-target: [x86_64-unknown-linux-gnu, arm-unknown-linux-musleabihf]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Extract crate information
        shell: bash
        run: |
          echo "PROJECT_NAME=$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      - name: Build and Test
        run: cross build --target ${{ matrix.rust-target }} --release
      - name: Login to GHCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          build-args: |
            RUST_BINARY=${{ env.PROJECT_NAME }}
          tags: |
            ghcr.io/containeroo/${{ env.PROJECT_NAME }}:latest
            ghcr.io/containeroo/${{ env.PROJECT_NAME }}:${{ env.PROJECT_VERSION }}
          labels: |
            maintainer=gi8lino <gi8@containeroo.ch>
            version=${{ env.PROJECT_VERSION }}
