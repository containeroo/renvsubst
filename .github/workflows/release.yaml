name: Release
on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: "0"
      - name: Build changelog from PRs with labels
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v3
        with:
          configuration: ".github/changelog-configuration.json"
          # PreReleases still get a changelog, but the next full release gets a diff since the last full release,
          # combining possible changelogs of all previous PreReleases in between.
          # PreReleases show a partial changelog since last PreRelease.
          ignorePreReleases: "${{ !contains(github.ref, '-rc') }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          body: ${{steps.build_changelog.outputs.changelog}}
          prerelease: "${{ contains(github.ref, '-rc') }}"
          # Ensure target branch for release is "master"
          commit: master
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: Run tests
      run: cargo test

    - name: Build for ARM
      run: |
        rustup target add armv7-unknown-linux-gnueabihf
        cargo build --release --target=armv7-unknown-linux-gnueabihf

    - name: Build for x86
      run: |
        rustup target add x86_64-unknown-linux-musl
        cargo build --release --target=x86_64-unknown-linux-musl

    - name: Build for Darwin
      run: |
        rustup target add x86_64-apple-darwin
        cargo build --release --target=x86_64-apple-darwin

    - name: Generate checksum for ARM binary
      run: sha256sum target/armv7-unknown-linux-gnueabihf/release/renvsubst_${{ env.GITHUB_REF }} > target/armv7-unknown-linux-gnueabihf/release/renvsubst_${{ env.GITHUB_REF }}.sha256

    - name: Generate checksum for x86 binary
      run: sha256sum target/x86_64-unknown-linux-musl/release/renvsubst_${{ env.GITHUB_REF }} > target/x86_64-unknown-linux-musl/release/renvsubst_${{ env.GITHUB_REF }}.sha256

    - name: Generate checksum for Darwin binary
      run: sha256sum target/x86_64-apple-darwin/release/renvsubst_${{ env.GITHUB_REF }} > target/x86_64-apple-darwin/release/renvsubst_${{ env.GITHUB_REF }}.sha256



    - name: Upload ARM binary as release asset
      uses: actions/upload-artifact@v2
      with:
        name: arm
        path: |
          target/armv7-unknown-linux-gnueabihf/release/renvsubst_${{ env.GITHUB_REF }}
          target/armv7-unknown-linux-gnueabihf/release/renvsubst_${{ env.GITHUB_REF }}.sha256

    - name: Upload x86 binary as release asset
      uses: actions/upload-artifact@v2
      with:
        name: x86
        path: |
          target/x86_64-unknown-linux-musl/release/renvsubst_${{ env.GITHUB_REF }}
          target/x86_64-unknown-linux-musl/release/renvsubst_${{ env.GITHUB_REF }}.sha256

    - name: Upload Darwin binary as release asset
      uses: actions/upload-artifact@v2
      with:
        name: darwin
        path: |
          target/x86_64-apple-darwin/release/renvsubst_${{ steps.tag.outputs.version }}
          target/x86_64-apple-darwin/release/renvsubst_${{ steps.tag.outputs.version }}.sha256
