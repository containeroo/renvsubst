name: Tag

on:
  push:
    branches:
      - master

jobs:
  create-tag:
    name: Create tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag
        id: get-tag
        shell: bash
        run: |
          echo PKG_VERSION=$(sed  -r -n 's/const VERSION: &str = "(.*)";$/\1/p' src/main.rs) >> $GITHUB_OUTPUT

      - name: Set Tag
        shell: bash
        run: |
          git tag v${{ steps.get-tag.outputs.PKG_VERSION }} && git push --tags
