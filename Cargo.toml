[package]
name = "renvsubst"
version = "0.3.119"
edition = "2021"
authors = ["gi8lino"]
categories = ["command-line-utilities"]
description = "Envsubst with some extra features written in Rust"
repository = "https://github.com/containeroo/renvsubst"
license = "MIT"

[dev-dependencies]
tempfile = "*"

[profile.release]
opt-level = "z"
debug = false
rpath = false
lto = true
panic = "abort"
codegen-units = 1
panic-abort-tests = true
incremental = false
overflow-checks = true
strip = true

[Build-dependencies]
cross = "0.2.1"
cargo-release = "0.24.5"


[release]
# Perform checks before creating a release
check = true

# Create a git tag and push it to the remote
tag = true

# Publish the package to crates.io
# (remove this line if your project is not a library)
publish = false

# Build for the specified platforms
targets = ["x86_64-unknown-linux-gnu", "x86_64-apple-darwin"]


# Build and upload Docker images
# (remove this section if you don't want to use Docker)
[[binaries]]
name = "renvsubst-amd64"
targets = ["x86_64-unknown-linux-gnu"]
# Add any additional flags or environment variables here
[[binaries]]
name = "renvsubst-darwin"
targets = ["x86_64-apple-darwin"]
# Add any additional flags or environment variables here

[[docker]]
image = "containeroo/renvsubst"
targets = ["amd64", "arm64"]
# Add any additional Dockerfile instructions or environment variables here
