[package]
name = "renvsubst"
version = "0.3.90"
edition = "2021"
authors = ["gi8lino"]
categories = ["command-line-utilities"]
description = "Envsubst with some extra features written in Rust"
repository = "https://github.com/containeroo/renvsubst"

[dev-dependencies]
tempfile = "*"

[profile.release]
opt-level = "z"
debug = false
rpath = false
lto = true
panic = "abort"
codegen-units = 1
panic-abort-tests = true
incremental = false
overflow-checks = true
strip = true

[build-dependencies]
# This is required to use the docker plugin
cargo-release = "0.24.5"

# Configuration for the docker plugin
[release]
plugins = ["cargo-release-docker"]
docker-image = "ghcr.io/containeroo/renvsubst"
docker-tag = "{version},latest"
docker-registry = "ghcr.io"
docker-platforms = "linux/amd64,linux/arm64"

# Additional build configuration
[package.metadata.build-cmd]
arm = "cargo build --release --target=armv7-unknown-linux-gnueabihf"
amd64 = "cargo build --release --target=x86_64-unknown-linux-gnu"

# GitHub release configuration
[package.metadata.release]
assets = [
    "target/armv7-unknown-linux-gnueabihf/release/renvsubst",
    "target/x86_64-unknown-linux-gnu/release/renvsubst",
]
