[package]
name = "renvsubst"
version = "0.3.9"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tempfile = "*"

[profile.release]
opt-level = "z"
debug = false
rpath = false
lto = true
panic = "abort"
codegen-units = 1
panic-abort-tests = true
incremental = false
overflow-checks = true
strip = true
